<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tesla 授权回调</title>
  <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 40px 20px;
    }
    .container { max-width: 400px; width: 100%; }
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #e82127;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    .desc { font-size: 14px; color: rgba(255,255,255,0.5); line-height: 1.6; }
    .success-icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: rgba(0,208,132,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 32px;
    }
    .error-icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: rgba(232,33,39,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 32px;
    }
    .btn-back {
      display: inline-block;
      margin-top: 32px;
      padding: 12px 32px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 24px;
      color: #fff;
      font-size: 16px;
      text-decoration: none;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div id="loading-state">
      <div class="spinner"></div>
      <div class="title">正在处理授权...</div>
      <div class="desc">请稍候，即将返回小程序</div>
    </div>
    <div id="success-state" class="hidden">
      <div class="success-icon">&#10003;</div>
      <div class="title">授权成功</div>
      <div class="desc">Tesla 账号已成功授权，请返回小程序继续操作</div>
      <a class="btn-back" href="javascript:void(0)" onclick="closePage()">返回小程序</a>
    </div>
    <div id="error-state" class="hidden">
      <div class="error-icon">&#10007;</div>
      <div class="title">授权失败</div>
      <div class="desc" id="error-msg">未获取到授权信息，请重试</div>
      <a class="btn-back" href="javascript:void(0)" onclick="closePage()">返回小程序</a>
    </div>
  </div>

  <script>
    function getParam(name) {
      var url = window.location.href
      var params = new URLSearchParams(url.split('?')[1] || '')
      return params.get(name)
    }

    var code = getParam('code')
    var state = getParam('state')
    var error = getParam('error')

    function isInMiniProgram() {
      return typeof window.wx !== 'undefined' && window.wx.miniProgram
    }

    function closePage() {
      if (isInMiniProgram()) {
        wx.miniProgram.navigateBack({ delta: 1 })
      }
    }

    window.addEventListener('load', function() {
      var loadingEl = document.getElementById('loading-state')
      var successEl = document.getElementById('success-state')
      var errorEl = document.getElementById('error-msg')

      if (error) {
        loadingEl.classList.add('hidden')
        document.getElementById('error-state').classList.remove('hidden')
        errorEl.textContent = decodeURIComponent(error) || '用户取消了授权'
        return
      }

      if (code) {
        if (isInMiniProgram()) {
          wx.miniProgram.postMessage({
            data: {
              type: 'oauth_callback',
              code: code,
              state: state || ''
            }
          })
          loadingEl.classList.add('hidden')
          document.getElementById('success-state').classList.remove('hidden')
          setTimeout(function() {
            wx.miniProgram.navigateBack({ delta: 1 })
          }, 2000)
        } else {
          loadingEl.classList.add('hidden')
          document.getElementById('success-state').classList.remove('hidden')
          document.querySelector('.desc').textContent = '授权码: ' + code
        }
      } else {
        loadingEl.classList.add('hidden')
        document.getElementById('error-state').classList.remove('hidden')
        errorEl.textContent = '未获取到授权信息'
      }
    })
  </script>
</body>
</html>
