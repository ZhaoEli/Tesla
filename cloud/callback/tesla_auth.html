<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>跳转中</title>
  <style>
    body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
    .loading { text-align: center; padding: 20px; }
    .spinner { width: 40px; height: 40px; margin: 0 auto 16px; border: 3px solid #e0e0e0; border-top-color: #e82127; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .text { font-size: 16px; color: #666; }
    .btn { display: none; margin-top: 20px; padding: 12px 32px; border: none; border-radius: 24px; background: #e82127; color: white; font-size: 16px; cursor: pointer; }
    .error { display: none; margin-top: 12px; font-size: 14px; color: #999; }
  </style>
</head>
<body>
  <div class="loading">
    <div class="spinner" id="spinner"></div>
    <div class="text">正在跳转到特斯拉登录页面...</div>
    <button class="btn" id="retryBtn" onclick="doRedirect()">重新跳转</button>
    <div class="error" id="errorMsg"></div>
  </div>
  <script>
    function doRedirect() {
      var authUrl = getQueryParam('url') || '';
      if (!authUrl) authUrl = decodeURIComponent(getQueryParam('url') || '');
      if (authUrl) {
        document.getElementById('spinner').style.display = 'block';
        document.getElementById('retryBtn').style.display = 'none';
        document.getElementById('errorMsg').style.display = 'none';
        window.location.href = authUrl;
      } else {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('retryBtn').style.display = 'block';
        document.getElementById('errorMsg').style.display = 'block';
        document.getElementById('errorMsg').textContent = '缺少授权链接参数';
      }
    }
    function getQueryParam(name) {
      var match = location.search.match(new RegExp('[?&]' + name + '=([^&]*)'));
      return match ? decodeURIComponent(match[1] || '') : '';
    }
    doRedirect();
  </script>
</body>
</html>
